<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>フルーツジュースパズル</title>
<style>
  body { font-family: 'Hiragino Maru Gothic ProN', sans-serif; background-color: #fff9e6; text-align: center; margin: 0; padding: 10px; user-select: none; }
  h1 { color: #ff8c00; font-size: 24px; margin-bottom: 5px; }
  .screen { display: none; flex-direction: column; align-items: center; justify-content: center; min-height: 80vh; }
  .active { display: flex; }

  /* 設定画面 */
  .setting-group { margin-bottom: 20px; }
  .setting-group h2 { font-size: 18px; color: #555; margin-bottom: 10px; }
  .btn { font-size: 18px; padding: 10px 15px; background-color: #ffd700; color: #333; border: 2px solid #ffcc00; border-radius: 10px; margin: 5px; cursor: pointer; font-weight: bold; }
  .btn.selected { background-color: #ff8c00; color: white; border-color: #ff4500; }
  .start-btn { font-size: 24px; padding: 15px 30px; background-color: #ff4500; color: white; border: none; border-radius: 15px; margin-top: 20px; cursor: pointer; box-shadow: 0 4px 6px rgba(0,0,0,0.2); }

  /* ゲーム画面 */
  #info { display: flex; justify-content: space-around; font-size: 20px; font-weight: bold; color: #333; width: 100%; max-width: 400px; margin-bottom: 10px; }
  #board { display: grid; gap: 5px; background-color: #ffe4b5; padding: 10px; border-radius: 15px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); touch-action: none; margin: 0 auto; }
  .tile { display: flex; align-items: center; justify-content: center; background-color: #fff; border-radius: 10px; cursor: pointer; user-select: none; }
  .tile.juice { animation: pop 0.5s; }
  @keyframes pop { 0% { transform: scale(1); } 50% { transform: scale(1.3); } 100% { transform: scale(0); } }

  /* ミキサー画面 */
  .juicer-msg { font-size: 24px; color: #ff4500; font-weight: bold; margin-bottom: 20px; height: 60px; }
  #mixer-wrapper { position: relative; margin: 20px auto; width: 160px; }
  #mixer-cup { width: 140px; height: 180px; border: 6px solid #ccc; border-top: none; border-bottom-left-radius: 30px; border-bottom-right-radius: 30px; background: rgba(255,255,255,0.6); margin: 0 auto; position: relative; overflow: hidden; display: flex; justify-content: center; align-items: center; }
  #mixer-base { width: 160px; height: 40px; background: #666; border-radius: 10px; margin-top: 5px; position: relative; }
  #mixer-button { width: 20px; height: 20px; background: #ff4500; border-radius: 50%; position: absolute; top: 10px; left: 70px; }
  #mixer-fruits { font-size: 40px; display: flex; flex-wrap: wrap; justify-content: center; align-items: center; width: 100%; letter-spacing: -5px; }

  .spin-fast { animation: spin-anim 0.3s linear infinite; }
  @keyframes spin-anim { 100% { transform: rotate(360deg) scale(0.8); } }
  .shake-base { animation: shake-base-anim 0.1s linear infinite; }
  @keyframes shake-base-anim { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-2px); } 75% { transform: translateX(2px); } }

  /* 結果画面 */
  #result-screen h2 { font-size: 32px; color: #ff4500; }
  #result-screen p { font-size: 24px; margin-top: 10px; }
</style>
</head>
<body>

<!-- 設定画面 -->
<div id="setup-screen" class="screen active">
  <h1>フルーツジュースパズル 🍹</h1>
  <div class="setting-group">
    <h2>▼ ばんめの ひろさ ▼</h2>
    <button class="btn sz-btn" onclick="setSize(4, this)">ちいさい (4x4)</button>
    <button class="btn sz-btn selected" onclick="setSize(5, this)">ふつう (5x5)</button>
    <button class="btn sz-btn" onclick="setSize(6, this)">おおきい (6x6)</button>
  </div>
  <div class="setting-group">
    <h2>▼ フルーツの しゅるい ▼</h2>
    <button class="btn fr-btn" onclick="setFruits(3, this)">3 こ</button>
    <button class="btn fr-btn selected" onclick="setFruits(4, this)">4 こ</button>
    <button class="btn fr-btn" onclick="setFruits(5, this)">5 こ</button>
  </div>
  <p style="color: #666; font-size: 14px; margin-top: 10px;">※おとがでます！ボリュームにちゅういしてね</p>
  <button class="start-btn" onclick="startGame()">ゲームスタート！</button>
</div>

<!-- ゲーム画面 -->
<div id="game-screen" class="screen">
  <div id="info">
    <div>のこり: <span id="time">60</span>びょう</div>
    <div>あつめた: <span id="score">0</span>こ</div>
  </div>
  <div id="board"></div>
</div>

<!-- ミキサー画面 -->
<div id="juicer-screen" class="screen">
  <div class="juicer-msg" id="juicer-text">あつめたフルーツを<br>ミキサーにいれるよ！</div>
  <div id="mixer-wrapper">
    <div id="mixer-cup">
      <div id="mixer-fruits"></div>
    </div>
    <div id="mixer-base"><div id="mixer-button"></div></div>
  </div>
</div>

<!-- 結果画面 -->
<div id="result-screen" class="screen">
  <h2>かんせい！🎉</h2>
  <div style="font-size: 80px;" id="result-juice-icon">🍹</div>
  <p>おいしいジュースが<br><span id="final-score" style="color:#ff4500; font-size:36px; font-weight:bold;">0</span> はい できたよ！</p>
  <button class="start-btn" onclick="showSetup()">もういっかい</button>
</div>

<script>
  // 音声管理 (Web Audio API)
  let audioCtx;
  function initAudio() {
    if (!audioCtx) {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }
    if (audioCtx.state === 'suspended') {
      audioCtx.resume();
    }
  }

  function playTone(freq, type, duration, vol=0.1) {
    if (!audioCtx) return;
    const osc = audioCtx.createOscillator();
    const gainNode = audioCtx.createGain();
    osc.type = type;
    osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
    gainNode.gain.setValueAtTime(vol, audioCtx.currentTime);
    gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
    osc.connect(gainNode);
    gainNode.connect(audioCtx.destination);
    osc.start();
    osc.stop(audioCtx.currentTime + duration);
  }

  function playSwipeSound() { playTone(600, 'sine', 0.1, 0.05); }
  function playMatchSound() {
    playTone(880, 'square', 0.1, 0.05);
    setTimeout(() => playTone(1108, 'square', 0.15, 0.05), 100);
  }
  function playBlenderSound() {
    if (!audioCtx) return;
    const osc = audioCtx.createOscillator();
    const gainNode = audioCtx.createGain();
    osc.type = 'sawtooth';
    osc.frequency.setValueAtTime(100, audioCtx.currentTime);
    osc.frequency.linearRampToValueAtTime(250, audioCtx.currentTime + 1);
    gainNode.gain.setValueAtTime(0, audioCtx.currentTime);
    gainNode.gain.linearRampToValueAtTime(0.1, audioCtx.currentTime + 0.2);
    gainNode.gain.setValueAtTime(0.1, audioCtx.currentTime + 2.5);
    gainNode.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 3);

    osc.connect(gainNode);
    gainNode.connect(audioCtx.destination);
    osc.start();
    osc.stop(audioCtx.currentTime + 3);
  }
  function playTadaSound() {
    playTone(523.25, 'sine', 0.2, 0.1);
    setTimeout(() => playTone(659.25, 'sine', 0.2, 0.1), 200);
    setTimeout(() => playTone(783.99, 'sine', 0.4, 0.1), 400);
  }
  function playEndBeep() { playTone(440, 'sine', 0.5, 0.1); } 

  const allFruits = ['🍎', '🍌', '🍇', '🍊', '🍉', '🍑'];
  let currentSize = 5;
  let currentFruitCount = 4;
  let activeFruits = [];
  let board = [];
  let score = 0;
  let timeLeft = 60;
  let timer = null;
  let isProcessing = false;

  function setSize(size, btn) {
    currentSize = size;
    document.querySelectorAll('.sz-btn').forEach(b => b.classList.remove('selected'));
    btn.classList.add('selected');
  }

  function setFruits(count, btn) {
    currentFruitCount = count;
    document.querySelectorAll('.fr-btn').forEach(b => b.classList.remove('selected'));
    btn.classList.add('selected');
  }

  function showScreen(id) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
  }

  function showSetup() {
    showScreen('setup-screen');
  }

  function startGame() {
    initAudio(); 
    activeFruits = allFruits.slice(0, currentFruitCount);
    score = 0;
    timeLeft = 60;
    document.getElementById('score').innerText = score;
    document.getElementById('time').innerText = timeLeft;

    initBoard();
    showScreen('game-screen');

    if(timer) clearInterval(timer);
    timer = setInterval(updateTime, 1000);
  }

  function updateTime() {
    timeLeft--;
    document.getElementById('time').innerText = timeLeft;
    if (timeLeft <= 0) {
      clearInterval(timer);
      playEndBeep();
      endGame();
    }
  }

  function endGame() {
    showScreen('juicer-screen');
    const mixerFruits = document.getElementById('mixer-fruits');
    const mixerBase = document.getElementById('mixer-base');
    const mixerButton = document.getElementById('mixer-button');
    const msg = document.getElementById('juicer-text');

    mixerFruits.innerText = activeFruits.join(' ');
    mixerFruits.classList.remove('spin-fast');
    mixerBase.classList.remove('shake-base');
    mixerButton.style.backgroundColor = '#ff4500';
    mixerCupBg = document.getElementById('mixer-cup');
    mixerCupBg.style.backgroundColor = 'rgba(255,255,255,0.6)';

    msg.innerHTML = 'あつめたフルーツを<br>ミキサーにいれるよ！';

    setTimeout(() => {
      msg.innerHTML = 'スイッチ オン！<br>ぐるぐるぐる〜！';
      mixerButton.style.backgroundColor = '#32cd32';
      mixerFruits.classList.add('spin-fast');
      mixerBase.classList.add('shake-base');

      playBlenderSound();

      setTimeout(() => {
         mixerCupBg.style.backgroundColor = '#ffdead';
         mixerFruits.innerText = '✨';
      }, 1500);

    }, 2000);

    setTimeout(() => {
      let cups = Math.floor(score / 3) + 1;
      document.getElementById('final-score').innerText = cups;
      document.getElementById('result-juice-icon').innerText = (cups > 10) ? '🍹🍹🍹' : '🍹';
      showScreen('result-screen');
      playTadaSound(); 
    }, 5500);
  }

  function initBoard() {
    const boardEl = document.getElementById('board');
    boardEl.innerHTML = '';

    // マス目のサイズを子供向けに大きく変更
    let tileSize = currentSize === 4 ? 85 : (currentSize === 5 ? 75 : 60);

    boardEl.style.gridTemplateColumns = `repeat(${currentSize}, 1fr)`;
    boardEl.style.width = `${currentSize * (tileSize + 5)}px`;
    boardEl.style.height = `${currentSize * (tileSize + 5)}px`;

    board = [];
    isProcessing = false;

    for (let r = 0; r < currentSize; r++) {
      let row = [];
      for (let c = 0; c < currentSize; c++) {
        let fruit = getRandomFruit(r, c, row, board);
        let tile = document.createElement('div');
        tile.className = 'tile';
        tile.style.width = `${tileSize}px`;
        tile.style.height = `${tileSize}px`;
        tile.style.fontSize = `${tileSize * 0.65}px`; // フルーツの絵文字も大きく
        tile.innerText = fruit;

        addSwipeListeners(tile, r, c);

        boardEl.appendChild(tile);
        row.push({ fruit: fruit, element: tile });
      }
      board.push(row);
    }
  }

  function addSwipeListeners(tile, r, c) {
    let startX, startY;

    tile.addEventListener('pointerdown', (e) => {
      if (isProcessing || timeLeft <= 0) return;
      startX = e.clientX;
      startY = e.clientY;
      tile.setPointerCapture(e.pointerId);
    });

    tile.addEventListener('pointerup', (e) => {
      if (isProcessing || timeLeft <= 0 || startX === undefined) return;
      let dx = e.clientX - startX;
      let dy = e.clientY - startY;
      startX = undefined; 
      startY = undefined;

      // 誤動作を防ぐため、スワイプ判定の距離を少し大きめ(30px)に変更
      if (Math.abs(dx) < 30 && Math.abs(dy) < 30) return;

      let targetR = r;
      let targetC = c;

      if (Math.abs(dx) > Math.abs(dy)) {
        if (dx > 0) targetC++; else targetC--;
      } else {
        if (dy > 0) targetR++; else targetR--;
      }

      if (targetR >= 0 && targetR < currentSize && targetC >= 0 && targetC < currentSize) {
        playSwipeSound();
        handleSwipe(r, c, targetR, targetC);
      }
    });
  }

  function handleSwipe(r1, c1, r2, c2) {
    isProcessing = true;
    swap(r1, c1, r2, c2);

    setTimeout(() => {
      if (!checkMatches()) {
        swap(r1, c1, r2, c2); 
        isProcessing = false;
      }
    }, 300);
  }

  function getRandomFruit(r, c, currentRow, fullBoard) {
    let fruit;
    do {
      fruit = activeFruits[Math.floor(Math.random() * activeFruits.length)];
    } while (
      (r >= 2 && fullBoard[r-1][c].fruit === fruit && fullBoard[r-2][c].fruit === fruit) ||
      (c >= 2 && currentRow[c-1].fruit === fruit && currentRow[c-2].fruit === fruit)
    );
    return fruit;
  }

  function swap(r1, c1, r2, c2) {
    let temp = board[r1][c1].fruit;
    board[r1][c1].fruit = board[r2][c2].fruit;
    board[r1][c1].element.innerText = board[r1][c1].fruit;
    board[r2][c2].fruit = temp;
    board[r2][c2].element.innerText = board[r2][c2].fruit;
  }

  function checkMatches() {
    let matched = false;
    let matchSet = new Set();

    for (let r = 0; r < currentSize; r++) {
      for (let c = 0; c < currentSize - 2; c++) {
        let f = board[r][c].fruit;
        if (f && f === board[r][c+1].fruit && f === board[r][c+2].fruit) {
          matchSet.add(`${r},${c}`); matchSet.add(`${r},${c+1}`); matchSet.add(`${r},${c+2}`);
        }
      }
    }
    for (let c = 0; c < currentSize; c++) {
      for (let r = 0; r < currentSize - 2; r++) {
        let f = board[r][c].fruit;
        if (f && f === board[r+1][c].fruit && f === board[r+2][c].fruit) {
          matchSet.add(`${r},${c}`); matchSet.add(`${r+1},${c}`); matchSet.add(`${r+2},${c}`);
        }
      }
    }

    if (matchSet.size > 0) {
      matched = true;
      playMatchSound();
      score += matchSet.size; 
      document.getElementById('score').innerText = score;

      matchSet.forEach(pos => {
        let [r, c] = pos.split(',').map(Number);
        board[r][c].element.innerText = '✨';
        board[r][c].element.classList.add('juice');
        board[r][c].fruit = null;
      });

      setTimeout(() => {
        matchSet.forEach(pos => {
          let [r, c] = pos.split(',').map(Number);
          board[r][c].element.classList.remove('juice');
          board[r][c].element.innerText = '';
        });
        shiftDown();
      }, 500);
    } else {
      isProcessing = false;
    }
    return matched;
  }

  function shiftDown() {
    for (let c = 0; c < currentSize; c++) {
      for (let r = currentSize - 1; r >= 0; r--) {
        if (board[r][c].fruit === null) {
          for (let k = r - 1; k >= 0; k--) {
            if (board[k][c].fruit !== null) {
              board[r][c].fruit = board[k][c].fruit;
              board[r][c].element.innerText = board[r][c].fruit;
              board[k][c].fruit = null;
              board[k][c].element.innerText = '';
              break;
            }
          }
        }
      }
    }
    fillRandom();
  }

  function fillRandom() {
    for (let r = 0; r < currentSize; r++) {
      for (let c = 0; c < currentSize; c++) {
        if (board[r][c].fruit === null) {
          board[r][c].fruit = activeFruits[Math.floor(Math.random() * activeFruits.length)];
          board[r][c].element.innerText = board[r][c].fruit;
        }
      }
    }
    setTimeout(() => {
      if(!checkMatches()) isProcessing = false;
    }, 400);
  }
</script>
</body>
</html>

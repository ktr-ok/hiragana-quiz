    border-radius: 18px;
    padding: 18px 10px;

    font-family: inherit;
    color: #fff;
    background: linear-gradient(135deg, #4fc3f7, #29b6f6);

  }

    margin-top: 14px;
    font-size: 1.4rem;
    font-weight: bold;
  }
  .next, .restart {
    margin-top: 14px;
    border: none;
    border-radius: 16px;
    padding: 14px 30px;
    font-size: 1.15rem;
    font-family: inherit;
    color: #fff;
    background: linear-gradient(135deg, #ffb74d, #fb8c00);
    box-shadow: 0 4px 0 #ef6c00;
    cursor: pointer;
  }
  .restart {

    box-shadow: 0 4px 0 #6a1b9a;
  }
  .hidden { display: none; }
  .result h2 {
    color: #ef6c00;
    font-size: 2rem;
    margin-bottom: 8px;
  }

    color: #555;
    font-size: 1.25rem;

const feedbackEl = document.getElementById('feedback');
const nextBtn = document.getElementById('nextBtn');
const playArea = document.getElementById('playArea');
const resultArea = document.getElementById('resultArea');
const resultFace = document.getElementById('resultFace');
const resultText = document.getElementById('resultText');
const restartBtn = document.getElementById('restartBtn');

function shuffle(arr) {
  return [...arr].sort(() => Math.random() - 0.5);
}

function startQuiz() {
  questions = shuffle(items).slice(0, TOTAL);
  index = 0;
  score = 0;
  qTotal.textContent = TOTAL;
  correctCount.textContent = 0;
  playArea.classList.remove('hidden');
  resultArea.classList.add('hidden');
  renderQuestion();
}

function renderQuestion() {
  const q = questions[index];
  qNum.textContent = index + 1;
  categoryEl.textContent = q.category;
  visualEl.textContent = q.emoji;
  feedbackEl.textContent = '';
  nextBtn.classList.add('hidden');
  choicesEl.innerHTML = '';

  const options = shuffle([q.name, ...q.wrong.slice(0, 3)]);
  options.forEach(option => {
    const btn = document.createElement('button');
    btn.className = 'btn';
    btn.textContent = option;
    btn.addEventListener('click', () => answer(btn, option, q.name));
    choicesEl.appendChild(btn);
  });
}

function answer(btn, selected, correct) {
  const buttons = document.querySelectorAll('.btn');
  buttons.forEach(b => b.disabled = true);

  if (selected === correct) {
    btn.classList.add('correct');
    feedbackEl.textContent = '🎉 せいかい！';
    feedbackEl.style.color = '#2e7d32';
    score++;
    correctCount.textContent = score;
  } else {
    btn.classList.add('wrong');
    feedbackEl.textContent = '😊 こたえは「' + correct + '」だよ';
    feedbackEl.style.color = '#c62828';
    buttons.forEach(b => {
      if (b.textContent === correct) b.classList.add('correct');
    });
  }
  nextBtn.classList.remove('hidden');
}

nextBtn.addEventListener('click', () => {
  index++;
  if (index >= TOTAL) {
    showResult();
  } else {
    renderQuestion();
  }
});

function showResult() {
  playArea.classList.add('hidden');
  resultArea.classList.remove('hidden');
  const rate = score / TOTAL;
  resultFace.textContent = rate >= 0.9 ? '🏆' : rate >= 0.7 ? '🌟' : rate >= 0.5 ? '😊' : '👏';
  resultText.textContent = TOTAL + 'もんちゅう ' + score + 'もん せいかい！';
}

restartBtn.addEventListener('click', startQuiz);
startQuiz();
</script>
</body>
</html>

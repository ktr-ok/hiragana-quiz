<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ひらがな 10もん くいず</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Hiragino Maru Gothic ProN', 'BIZ UDPGothic', sans-serif;
    background: linear-gradient(135deg, #fff3e0 0%, #e8f5e9 100%);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .app {
    width: 100%;
    max-width: 620px;
    background: #fff;
    border-radius: 24px;
    padding: 24px;
    text-align: center;
    box-shadow: 0 10px 30px rgba(0,0,0,.12);
  }
  h1 { color: #ef6c00; font-size: 2rem; margin-bottom: 10px; }
  .sub { color: #666; margin-bottom: 16px; font-size: 1rem; }
  .score { color: #444; font-size: 1.1rem; margin-bottom: 14px; }
  .visual {
    font-size: 5.8rem;
    line-height: 1.2;
    min-height: 120px;
    display: flex;
    justify-content: center;
    align-items: center;
    margin-bottom: 10px;
  }
  .word { font-size: 2.3rem; color: #333; font-weight: bold; letter-spacing: .1em; margin-bottom: 18px; }
  .choices {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }
  .btn {
    border: none;
    border-radius: 18px;
    padding: 18px 10px;
    font-size: 2rem;
    font-family: inherit;
    color: #fff;
    background: linear-gradient(135deg, #4fc3f7, #29b6f6);
    box-shadow: 0 4px 0 #0288d1;
    cursor: pointer;
  }
  .btn.correct { background: linear-gradient(135deg, #81c784, #4caf50); box-shadow: 0 4px 0 #2e7d32; }
  .btn.wrong { background: linear-gradient(135deg, #ef9a9a, #e57373); box-shadow: 0 4px 0 #c62828; }
  .feedback { min-height: 2em; font-size: 1.45rem; font-weight: bold; margin-top: 14px; }
  .next, .restart {
    margin-top: 14px;
    border: none;
    border-radius: 16px;
    padding: 14px 30px;
    font-size: 1.15rem;
    font-family: inherit;
    color: #fff;
    background: linear-gradient(135deg, #ffb74d, #fb8c00);
    box-shadow: 0 4px 0 #ef6c00;
    cursor: pointer;
  }
  .restart { background: linear-gradient(135deg, #ba68c8, #8e24aa); box-shadow: 0 4px 0 #6a1b9a; }
  .hidden { display: none; }
  .result h2 { color: #ef6c00; font-size: 2rem; margin-bottom: 8px; }
  .result p { color: #555; font-size: 1.2rem; margin-bottom: 10px; }
</style>
</head>
<body>
<div class="app">
  <h1>ひらがな 10もん くいず</h1>
  <div class="sub">えをみて　〇に はいる もじを えらぼう</div>

  <div id="playArea">
    <div class="score">もんだい <span id="qNum">1</span> / <span id="qTotal">10</span>　せいかい <span id="correctCount">0</span></div>
    <div class="visual" id="visual"></div>
    <div class="word" id="maskedWord"></div>
    <div class="choices" id="choices"></div>
    <div class="feedback" id="feedback"></div>
    <button class="next hidden" id="nextBtn">つぎへ</button>
  </div>

  <div class="result hidden" id="resultArea">
    <h2 id="resultFace"></h2>
    <h2>おしまい</h2>
    <p id="resultText"></p>
    <button class="restart" id="restartBtn">もういちど あそぶ</button>
  </div>
</div>

<script>
const ALL_HIRAGANA = [
  "あ","い","う","え","お",
  "か","き","く","け","こ",
  "さ","し","す","せ","そ",
  "た","ち","つ","て","と",
  "な","に","ぬ","ね","の",
  "は","ひ","ふ","へ","ほ",
  "ま","み","む","め","も",
  "や","ゆ","よ",
  "ら","り","る","れ","ろ",
  "わ","を","ん"
];

const QUESTION_COUNT = 10;

const questions = [
  { emoji: "🐜", word: "あり", masked: "〇り", answer: "あ" },
  { emoji: "🍓", word: "いちご", masked: "〇ちご", answer: "い" },
  { emoji: "🐄", word: "うし", masked: "〇し", answer: "う" },
  { emoji: "✏️", word: "えんぴつ", masked: "〇んぴつ", answer: "え" },
  { emoji: "👹", word: "おに", masked: "〇に", answer: "お" },
  { emoji: "☂️", word: "かさ", masked: "〇さ", answer: "か" },
  { emoji: "🦒", word: "きりん", masked: "〇りん", answer: "き" },
  { emoji: "🐻", word: "くま", masked: "〇ま", answer: "く" },
  { emoji: "🍰", word: "けーき", masked: "〇ーき", answer: "け" },
  { emoji: "🐨", word: "こあら", masked: "〇あら", answer: "こ" },
  { emoji: "🐟", word: "さかな", masked: "〇かな", answer: "さ" },
  { emoji: "🦌", word: "しか", masked: "〇か", answer: "し" },
  { emoji: "🍉", word: "すいか", masked: "〇いか", answer: "す" },
  { emoji: "🍘", word: "せんべい", masked: "〇んべい", answer: "せ" },
  { emoji: "🍦", word: "そふとくりーむ", masked: "〇ふとくりーむ", answer: "そ" },
  { emoji: "🐙", word: "たこ", masked: "〇こ", answer: "た" },
  { emoji: "🧀", word: "ちーず", masked: "〇ーず", answer: "ち" },
  { emoji: "🌙", word: "つき", masked: "〇き", answer: "つ" },
  { emoji: "🐞", word: "てんとうむし", masked: "〇んどうむし", answer: "て" },
  { emoji: "⏰", word: "とけい", masked: "〇けい", answer: "と" },
  { emoji: "🍆", word: "なす", masked: "〇す", answer: "な" },
  { emoji: "🥕", word: "にんじん", masked: "〇んじん", answer: "に" },
  { emoji: "🧸", word: "ぬいぐるみ", masked: "〇いぐるみ", answer: "ぬ" },
  { emoji: "🐱", word: "ねこ", masked: "〇こ", answer: "ね" },
  { emoji: "🪚", word: "のこぎり", masked: "〇こぎり", answer: "の" },
  { emoji: "✂️", word: "はさみ", masked: "〇さみ", answer: "は" },
  { emoji: "✈️", word: "ひこうき", masked: "〇こうき", answer: "ひ" },
  { emoji: "🎈", word: "ふうせん", masked: "〇うせん", answer: "ふ" },
  { emoji: "🐍", word: "へび", masked: "〇び", answer: "へ" },
  { emoji: "⭐", word: "ほし", masked: "〇し", answer: "ほ" },
  { emoji: "🍊", word: "みかん", masked: "〇かん", answer: "み" },
  { emoji: "🔎", word: "むしめがね", masked: "〇しめがね", answer: "む" },
  { emoji: "👓", word: "めがね", masked: "〇がね", answer: "め" },
  { emoji: "🍑", word: "もも", masked: "〇も", answer: "も" },
  { emoji: "⛰️", word: "やま", masked: "〇ま", answer: "や" },
  { emoji: "⛄", word: "ゆきだるま", masked: "〇きだるま", answer: "ゆ" },
  { emoji: "⛵", word: "よっと", masked: "〇っと", answer: "よ" },
  { emoji: "🦁", word: "らいおん", masked: "〇いおん", answer: "ら" },
  { emoji: "🍎", word: "りんご", masked: "〇んご", answer: "り" },
  { emoji: "💃", word: "るんば", masked: "〇んば", answer: "る" },
  { emoji: "🍋", word: "れもん", masked: "〇もん", answer: "れ" },
  { emoji: "🚀", word: "ろけっと", masked: "〇けっと", answer: "ろ" },
  { emoji: "🐊", word: "わに", masked: "〇に", answer: "わ" },
  { emoji: "💩", word: "うんち", masked: "う〇ち", answer: "ん" }
];

let gameQuestions = [];
let index = 0;
let score = 0;

const qNum = document.getElementById('qNum');
const qTotal = document.getElementById('qTotal');
const correctCount = document.getElementById('correctCount');
const visual = document.getElementById('visual');
const maskedWord = document.getElementById('maskedWord');
const choices = document.getElementById('choices');
const feedback = document.getElementById('feedback');
const nextBtn = document.getElementById('nextBtn');
const playArea = document.getElementById('playArea');
const resultArea = document.getElementById('resultArea');
const resultFace = document.getElementById('resultFace');
const resultText = document.getElementById('resultText');
const restartBtn = document.getElementById('restartBtn');

function shuffle(arr) {
  return [...arr].sort(() => Math.random() - 0.5);
}

function buildChoices(answer) {
  const wrongPool = ALL_HIRAGANA.filter(ch => ch !== answer);
  const wrongs = shuffle(wrongPool).slice(0, 3);
  return shuffle([answer, ...wrongs]);
}

function startQuiz() {
  gameQuestions = shuffle(questions).slice(0, QUESTION_COUNT);
  index = 0;
  score = 0;
  qTotal.textContent = QUESTION_COUNT;
  correctCount.textContent = 0;
  playArea.classList.remove('hidden');
  resultArea.classList.add('hidden');
  showQuestion();
}

function showQuestion() {
  const q = gameQuestions[index];
  qNum.textContent = index + 1;
  visual.textContent = q.emoji;
  maskedWord.textContent = q.masked;
  feedback.textContent = '';
  nextBtn.classList.add('hidden');
  choices.innerHTML = '';

  const currentChoices = buildChoices(q.answer);
  currentChoices.forEach(c => {
    const btn = document.createElement('button');
    btn.className = 'btn';
    btn.textContent = c;
    btn.addEventListener('click', () => answer(btn, c, q.answer, q.word));
    choices.appendChild(btn);
  });
}

function answer(btn, selected, correct, word) {
  const buttons = document.querySelectorAll('.btn');
  buttons.forEach(b => b.disabled = true);

  if (selected === correct) {
    btn.classList.add('correct');
    feedback.textContent = '🎉 せいかい！ ' + word;
    feedback.style.color = '#2e7d32';
    score++;
    correctCount.textContent = score;
  } else {
    btn.classList.add('wrong');
    feedback.textContent = '😊 こたえは「' + correct + '」だよ';
    feedback.style.color = '#c62828';
    buttons.forEach(b => {
      if (b.textContent === correct) b.classList.add('correct');
    });
  }
  nextBtn.classList.remove('hidden');
}

nextBtn.addEventListener('click', () => {
  index++;
  if (index >= gameQuestions.length) {
    showResult();
  } else {
    showQuestion();
  }
});

function showResult() {
  playArea.classList.add('hidden');
  resultArea.classList.remove('hidden');
  const rate = score / gameQuestions.length;
  resultFace.textContent = rate >= 0.9 ? '🏆' : rate >= 0.7 ? '🌟' : rate >= 0.5 ? '😊' : '👏';
  resultText.textContent = gameQuestions.length + 'もんちゅう ' + score + 'もん せいかい！';
}

restartBtn.addEventListener('click', startQuiz);
startQuiz();
</script>
</body>
</html>
